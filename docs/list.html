---
layout: default
title: Resources
---
<h2>Resources</h2>

<div style="margin:12px 0;">
  <input id="q" placeholder="キーワード / tag を入力（例: diffusion, llm）" style="padding:8px;width:100%;max-width:480px;border:1px solid #ddd;border-radius:6px;">
</div>

<div style="margin:8px 0;">
  <select id="sort">
    <option value="updated_desc">更新が新しい順</option>
    <option value="score_desc">スコアが高い順</option>
    <option value="title_asc">タイトル順</option>
  </select>
  <select id="type"><option value="">すべての種類</option></select>
  <select id="license"><option value="">すべてのライセンス</option></select>
</div>

<div id="quickTags" style="margin:8px 0;"></div>

<div style="opacity:.8;font-size:.9em;">
  <span id="count">0</span> items
  <span id="pageInfo" style="float:right;"></span>
</div>

<div id="list" style="margin-top:8px;"></div>

<div style="margin:12px 0;display:flex;gap:8px;justify-content:center;">
  <button id="prev" disabled>Prev</button>
  <button id="next" disabled>Next</button>
</div>

<script>
(async () => {
  const RES_URL = '{{ "/resources.json" | relative_url }}?v=' + Date.now();
  const res = await fetch(RES_URL, {cache:'no-store'});
  const data = await res.json();

  // UI
  const q = document.getElementById('q');
  const sortSel = document.getElementById('sort');
  const typeSel = document.getElementById('type');
  const licenseSel = document.getElementById('license');
  const quick = document.getElementById('quickTags');
  const list = document.getElementById('list');
  const count = document.getElementById('count');
  const prev = document.getElementById('prev');
  const next = document.getElementById('next');
  const pageInfo = document.getElementById('pageInfo');

  const PAGE = 48;
  let page = 1;
  let activeTags = new Set();

  // util
  const esc = s => (s||'').toString().replace(/[&<>\"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const toDate = s => s ? (s+'').slice(0,10) : '';

  // 種類（source_type）/ ライセンス（tags: license:*）を抽出
  const types = Array.from(new Set(data.map(x=>x.source_type).filter(Boolean))).sort();
  for (const t of types){ const o=document.createElement('option'); o.value=t; o.textContent=t; typeSel.appendChild(o); }
  const licenses = Array.from(new Set(
    data.flatMap(x => (x.tags||[]).filter(t=>/^license:/i.test(t)).map(t=>t.replace(/^license:/i,'')))
  )).sort();
  for (const l of licenses){ const o=document.createElement('option'); o.value=l; o.textContent=l; licenseSel.appendChild(o); }

  // 上位タグ20
  function topNTags(n=20){
    const freq = new Map();
    for(const x of data){
      for(const t of (x.tags||[])){
        if(/^license:/i.test(t)) continue;
        const k=(t||'').trim(); if(!k) continue;
        freq.set(k,(freq.get(k)||0)+1);
      }
    }
    return [...freq.entries()].sort((a,b)=>b[1]-a[1]).slice(0,n).map(([k])=>k);
  }
  function renderQuick(){
    quick.innerHTML = topNTags(20).map(t =>
      `<button class="qt" data-t="${esc(t)}" style="margin:2px 6px 2px 0;padding:4px 10px;border:1px solid #ddd;border-radius:999px;background:${activeTags.has(t)?'#333':'#fff'};color:${activeTags.has(t)?'#fff':'#000'}">${esc(t)}</button>`
    ).join('');
  }

  // スコア（スター/ダウンロードの対数 + 直近更新ボーナス）
  function scoreOf(it){
    const s = Number(it['stars/downloads']||0);
    const star = Math.log10(Math.max(1,s));
    let rec = 0;
    try{
      const ok = it.updated_at && it.updated_at.slice(0,10) >= (new Date(Date.now()-30*864e5)).toISOString().slice(0,10);
      rec = ok ? 0.6 : 0;
    }catch(_){}
    return +(star+rec).toFixed(3);
  }

  // フィルタ＆ソート適用
  function apply(){
    const qv = (q.value||'').toLowerCase().trim();
    const typ = typeSel.value;
    const lic = licenseSel.value;

    let arr = data.filter(x=>{
      if(typ && x.source_type!==typ) return false;
      if(lic){
        const has = (x.tags||[]).some(t=>t.toLowerCase()==='license:'+lic.toLowerCase());
        if(!has) return false;
      }
      if(activeTags.size){
        const s = new Set(x.tags||[]);
        for(const t of activeTags){ if(!s.has(t)) return false; }
      }
      if(qv){
        const hay=[x.title,x.short_desc,x.url,x.id,(x.tags||[]).join(' ')].join(' ').toLowerCase();
        if(!hay.includes(qv)) return false;
      }
      return true;
    });

    for(const it of arr){ if(typeof it.score!=='number') it.score = scoreOf(it); }

    const how = sortSel.value;
    if(how==='updated_desc') arr.sort((a,b)=>String(b.updated_at||'').localeCompare(String(a.updated_at||'')));
    else if(how==='score_desc') arr.sort((a,b)=>(b.score||0)-(a.score||0));
    else if(how==='title_asc') arr.sort((a,b)=>String(a.title||'').localeCompare(String(b.title||'')));

    return arr;
  }

  function render(){
    const arr = apply();
    const total = arr.length;
    const pages = Math.max(1, Math.ceil(total/PAGE));
    if(page>pages) page = pages;

    const view = arr.slice((page-1)*PAGE, page*PAGE);
    count.textContent = String(total);

    list.innerHTML = view.map(x=>`
      <div class="card" style="margin:12px 0;padding:12px;border:1px solid #e5e5e5;border-radius:8px;">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <b>${esc(x.title||'')}</b>
          ${x.source_type?`<span style="border:1px solid #ddd;border-radius:12px;padding:2px 8px;font-size:.85em;opacity:.8;">${esc(x.source_type)}</span>`:''}
          <small style="opacity:.8">score:${esc(x.score)}</small>
          ${x.updated_at?`<small style="opacity:.8">更新:${esc(toDate(x.updated_at))}</small>`:''}
          <a href="${esc(x.url||'#')}" target="_blank" rel="noopener" class="open" style="margin-left:auto;">Open</a>
        </div>
        ${x.short_desc?`<div style="margin-top:6px;">${esc(x.short_desc)}</div>`:''}
        <div style="margin-top:6px">${(x.tags||[]).map(t=>`<a href="#" class="tag" data-t="${esc(t)}" style="display:inline-block;margin:2px 6px 2px 0;padding:2px 8px;border:1px solid #ddd;border-radius:999px;font-size:.85em;">${esc(t)}</a>`).join('')}</div>
      </div>
    `).join('');

    pageInfo.textContent = `${page} / ${pages}`;
    prev.disabled = page<=1; next.disabled = page>=pages;

    // イベント：Open
    list.querySelectorAll('a.open').forEach(a=>{
      a.addEventListener('click', ()=>{
        try{ plausible && plausible('Open'); }catch(_){}
      });
    });
    // イベント：タグクリック
    list.querySelectorAll('a.tag').forEach(a=>{
      a.addEventListener('click', (e)=>{
        e.preventDefault();
        const t = a.dataset.t;
        if(activeTags.has(t)) activeTags.delete(t); else activeTags.add(t);
        try{ plausible && plausible('TagFilter', {props:{ tag:t }}); }catch(_){}
        render(); // 再描画
      });
    });
  }

  // 初期描画
  renderQuick(); render();

  // 検索（デバウンス）
  let tid=null;
  q.addEventListener('input', ()=>{
    clearTimeout(tid);
    tid=setTimeout(()=>{
      page=1; render();
      try{ plausible && plausible('Search', {props:{ q:q.value }}); }catch(_){}
    }, 400);
  });

  // セレクト（イベント名を明示）
  sortSel.addEventListener('change', ()=>{ page=1; render(); try{ plausible && plausible('Sort', {props:{ sort:sortSel.value }});}catch(_){} });
  typeSel.addEventListener('change', ()=>{ page=1; render(); try{ plausible && plausible('TypeFilter', {props:{ type:typeSel.value||'all' }});}catch(_){} });
  licenseSel.addEventListener('change', ()=>{ page=1; render(); try{ plausible && plausible('LicenseFilter', {props:{ license:licenseSel.value||'all' }});}catch(_){} });

  // ページング
  prev.addEventListener('click', ()=>{ if(page>1){ page--; render(); }});
  next.addEventListener('click', ()=>{ page++; render(); }});
})();
</script>
