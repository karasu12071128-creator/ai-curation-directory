---
layout: default
title: Resources
---

<h1>Resources</h1>

<!-- 検索ボックス -->
<input id="q" type="search" placeholder="キーワード / tag を入力（例: diffusion, llm）" style="width:100%;max-width:680px;padding:.8rem 1rem;border-radius:10px;border:1px solid rgba(0,0,0,.15);">

<!-- コントロール行 -->
<div style="display:flex;gap:.6rem;flex-wrap:wrap;margin:.8rem 0 1rem;">
  <select id="sortSel" aria-label="並び順" style="padding:.5rem .7rem;border-radius:10px;border:1px solid rgba(0,0,0,.15);">
    <option value="score_desc">更新/人気が新しい順</option>
    <option value="title_asc">タイトル A→Z</option>
  </select>

  <select id="typeSel" aria-label="種類" style="padding:.5rem .7rem;border-radius:10px;border:1px solid rgba(0,0,0,.15);">
    <option value="all">すべての種類</option>
  </select>

  <select id="licenseSel" aria-label="ライセンス" style="padding:.5rem .7rem;border-radius:10px;border:1px solid rgba(0,0,0,.15);">
    <option value="all">すべてのライセンス</option>
  </select>
</div>

<!-- クイックタグ（上位20件） -->
<div id="quick" class="chips" style="display:flex;flex-wrap:wrap;gap:.5rem;margin:.5rem 0 1rem;"></div>

<!-- 件数 -->
<div id="count" style="margin:.4rem 0 1rem;color:rgba(0,0,0,.6)">0 items</div>

<!-- リスト -->
<div id="list" style="display:grid;grid-template-columns:1fr;gap:14px;max-width:900px"></div>

<!-- ページング -->
<div style="display:flex;align-items:center;gap:.6rem;margin:1rem 0;">
  <button id="prev" disabled style="padding:.5rem .9rem;border:1px solid rgba(0,0,0,.15);border-radius:10px;background:#fff">Prev</button>
  <button id="next" disabled style="padding:.5rem .9rem;border:1px solid rgba(0,0,0,.15);border-radius:10px;background:#fff">Next</button>
  <span id="pageInfo" style="color:rgba(0,0,0,.6)"></span>
</div>

<style>
  /* ここは他テーマに潰されにくいようスコープ弱依存の素朴CSS */
  .chip { display:inline-flex; align-items:center; gap:.35rem; padding:.30rem .65rem;
          border-radius:999px; border:1px solid rgba(0,0,0,.15); font-size:.92rem;
          background:#fff; cursor:pointer; user-select:none; }
  .chip.active { background:#2f2f2f; color:#fff; border-color:#2f2f2f; }
  .tag { display:inline-flex; padding:.18rem .55rem; border:1px solid rgba(0,0,0,.15);
         border-radius:999px; font-size:.82rem; background:#fff; }
  .card { padding:14px 16px; border:1px solid rgba(0,0,0,.12); border-radius:14px; background:#fff; }
  .card h3 { margin:.2rem 0 .4rem; font-size:1.05rem; }
  .meta { color:rgba(0,0,0,.6); font-size:.9rem; margin-bottom:.35rem; }
  .tags { display:flex; flex-wrap:wrap; gap:.4rem; }
  @media (min-width: 760px) { #list { grid-template-columns:1fr 1fr; } }
</style>

<script>
(async () => {
  // ============ 0) ユーティリティ ============
  const noop = (..._) => {};
  const track = (name, props={}) => (window.plausible || noop)(name, {props});
  const qs = s => document.querySelector(s);
  const byId = id => document.getElementById(id);

  const q = byId('q');
  const quick = byId('quick');
  const list = byId('list');
  const count = byId('count');
  const prev = byId('prev');
  const next = byId('next');
  const pageInfo = byId('pageInfo');
  const sortSel = byId('sortSel');
  const typeSel = byId('typeSel');
  const licenseSel = byId('licenseSel');

  const PAGE = 48;
  let page = 1;
  let activeTags = new Set();

  // ============ 1) データ読込（パス冗長化で0 items対策） ============
  const CANDIDATES = [
    'resources.json',
    './resources.json',
    'data/resources.json',
    './data/resources.json',
    // リポジトリ名で公開しているときの保険
    location.pathname.replace(/\/[^/]*$/, '/') + 'resources.json'
  ];

  let data = [];
  for (const p of CANDIDATES) {
    try {
      const res = await fetch(p + '?v=' + Date.now());
      if (res.ok) { data = await res.json(); break; }
    } catch (e) {}
  }
  if (!Array.isArray(data)) data = [];

  // 正規化
  data = data.map((d, i) => {
    const tags = Array.isArray(d.tags) ? d.tags.filter(Boolean) : [];
    const lic = (tags.find(t => /^license:/i.test(t)) || 'license:unknown').split(':')[1];
    return {
      id: d.id || ('item-' + i),
      title: d.title || '(no title)',
      url: d.url || '#',
      score: Number(d.score || 0),
      source_type: d.source_type || 'other',
      tags,
      license: lic
    };
  });

  // ============ 2) セレクトの候補を埋める ============
  const types = Array.from(new Set(data.map(d => d.source_type))).sort();
  types.forEach(t => {
    const o = document.createElement('option'); o.value = t; o.textContent = t; typeSel.appendChild(o);
  });

  const licenses = Array.from(new Set(data.map(d => d.license))).sort();
  licenses.forEach(t => {
    const o = document.createElement('option'); o.value = t; o.textContent = t; licenseSel.appendChild(o);
  });

  // ============ 3) クイックタグ（上位20件） ============
  const freq = new Map();
  for (const d of data) for (const t of d.tags) freq.set(t, (freq.get(t)||0)+1);
  const TOP = [...freq.entries()]
    .filter(([t]) => !/^license:/i.test(t))     // license:xxx は除外
    .sort((a,b) => b[1]-a[1]).slice(0, 20);

  quick.innerHTML = '';
  TOP.forEach(([tag, n]) => {
    const chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'chip';
    chip.setAttribute('data-tag', tag);
    chip.innerHTML = `${tag} <span style="opacity:.7">(${n})</span>`;
    chip.addEventListener('click', () => {
      chip.classList.toggle('active');
      if (chip.classList.contains('active')) { activeTags.add(tag); } else { activeTags.delete(tag); }
      page = 1;
      track('TagFilter', { value: tag });
      render();
    });
    quick.appendChild(chip);
  });

  // ============ 4) フィルタ & ソート & ページング ============
  sortSel.addEventListener('change', () => { page = 1; track('Sort', { value: sortSel.value }); render(); });
  typeSel.addEventListener('change', () => { page = 1; track('TypeFilter', { value: typeSel.value }); render(); });
  licenseSel.addEventListener('change', () => { page = 1; track('LicenseFilter', { value: licenseSel.value }); render(); });

  let searchTimer = 0;
  q.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { page = 1; track('Search', { q: q.value.trim() }); render(); }, 400);
  });

  prev.addEventListener('click', () => { if (page>1) { page--; render(); } });
  next.addEventListener('click', () => { page++; render(); });

  function filterAll() {
    const kw = q.value.trim().toLowerCase();
    const words = kw ? kw.split(/\s+/) : [];
    const type = typeSel.value;
    const lic = licenseSel.value;

    return data.filter(d => {
      if (type !== 'all' && d.source_type !== type) return false;
      if (lic !== 'all' && d.license !== lic) return false;
      if (activeTags.size) {
        const ok = [...activeTags].every(t => d.tags.includes(t));
        if (!ok) return false;
      }
      if (words.length) {
        const hay = (d.title + ' ' + d.tags.join(' ')).toLowerCase();
        for (const w of words) if (!hay.includes(w)) return false;
      }
      return true;
    });
  }

  function sortAll(arr) {
    if (sortSel.value === 'title_asc') return arr.sort((a,b)=> a.title.localeCompare(b.title));
    // デフォルト: score desc（更新/人気の近似）
    return arr.sort((a,b)=> (b.score||0)-(a.score||0));
  }

  function render() {
    const filtered = sortAll(filterAll());
    const total = filtered.length;
    count.textContent = `${total} items`;
    const maxPage = Math.max(1, Math.ceil(total / PAGE));
    if (page > maxPage) page = maxPage;

    const start = (page-1)*PAGE, end = start + PAGE;
    const slice = filtered.slice(start, end);

    list.innerHTML = slice.map(d => `
      <div class="card">
        <div class="meta">${d.source_type} • score:${(d.score ?? 0).toFixed(2)}</div>
        <h3>${escapeHtml(d.title)}</h3>
        <div class="tags">
          ${d.tags.slice(0, 24).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
        </div>
        <div style="margin-top:.6rem">
          <a href="${d.url}" target="_blank" rel="noopener" data-open="${escapeAttr(d.id)}">Open</a>
        </div>
      </div>
    `).join('');

    // Open 計測
    list.querySelectorAll('a[data-open]').forEach(a => {
      a.addEventListener('click', () => track('Open', { id: a.getAttribute('data-open') }));
    });

    // ページング
    prev.disabled = (page<=1);
    next.disabled = (page>=maxPage);
    pageInfo.textContent = `${page} / ${maxPage}`;
  }

  function escapeHtml(s=''){return s.replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));}
  function escapeAttr(s=''){return String(s).replace(/"/g,'&quot;');}

  render();
})();
</script>
