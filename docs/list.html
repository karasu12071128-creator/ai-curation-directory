---
layout: default
title: Resources
---

<h2>Resources</h2>
<input id="q" placeholder="キーワード / tag を入力（例: diffusion, llm）">
<div class="row">
  <select id="sort">
    <option value="updated_at" selected>更新が新しい順</option>
    <option value="score">スコア順</option>
  </select>
  <select id="type">
    <option value="">すべての種類</option>
  </select>
  <select id="license">
    <option value="">すべてのライセンス</option>
  </select>
</div>
<div id="tags" class="chips"></div>
<p id="count"></p>
<div id="list"></div>
<div class="row">
  <button id="prev">Prev</button>
  <button id="next">Next</button>
</div>
<p id="pageInfo"></p>

<script>
async function loadData() {
  const candidates = [
    "{{ '/resources.json' | relative_url }}",
    "{{ '/data/resources.json' | relative_url }}"
  ];
  for (const url of candidates) {
    try {
      const r = await fetch(url);
      if (r.ok) {
        return await r.json();
      }
    } catch (e) {
      continue;
    }
  }
  throw new Error('resources.json not found');
}
function escapeHtml(s) {
  return (s||'').toString().replace(/[&<>"]/g, m =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
}
async function main() {
  const data = await loadData();
  const q = document.getElementById('q');
  const sortSel = document.getElementById('sort');
  const typeSel = document.getElementById('type');
  const licenseSel = document.getElementById('license');
  const tagsDiv = document.getElementById('tags');
  const listDiv = document.getElementById('list');
  const countSpan = document.getElementById('count');
  const prev = document.getElementById('prev');
  const next = document.getElementById('next');
  const pageInfo = document.getElementById('pageInfo');

  // populate Type and License filters
  const types = new Set(data.map(x => x.source_type).filter(Boolean));
  types.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    typeSel.appendChild(opt);
  });
  const licenses = new Set();
  data.forEach(x => {
    const lic = (x.license || '').split(',').map(s => s.trim()).filter(Boolean);
    lic.forEach(l => licenses.add(l));
  });
  licenses.forEach(l => {
    const opt = document.createElement('option');
    opt.value = l; opt.textContent = l;
    licenseSel.appendChild(opt);
  });

  // quick tags (top 20)
  const freq = {};
  data.forEach(x => (x.tags||[]).forEach(t => {freq[t] = (freq[t]||0)+1;}));
  const topTags = Object.entries(freq).sort((a,b) => b[1]-a[1]).slice(0,20).map(x=>x[0]);
  topTags.forEach(t => {
    const span = document.createElement('span');
    span.textContent = t;
    span.className = 'chip';
    span.addEventListener('click', () => {
      plausible('TagFilter', {props:{value:t}});
      if (activeTags.has(t)) { activeTags.delete(t); span.classList.remove('active'); }
      else { activeTags.add(t); span.classList.add('active'); }
      page = 1; render();
    });
    tagsDiv.appendChild(span);
  });

  let page = 1;
  const PAGE = 48;
  const activeTags = new Set();

  function render() {
    let arr = data;
    if (q.value.trim()) {
      const kw = q.value.trim().toLowerCase();
      arr = arr.filter(x =>
        (x.title || '').toLowerCase().includes(kw) ||
        (x.tags || []).some(t => t.toLowerCase().includes(kw)) ||
        (x.short_desc || '').toLowerCase().includes(kw)
      );
    }
    if (activeTags.size) {
      arr = arr.filter(x => [...activeTags].every(t => (x.tags||[]).includes(t)));
    }
    if (typeSel.value) {
      arr = arr.filter(x => x.source_type === typeSel.value);
    }
    if (licenseSel.value) {
      arr = arr.filter(x => (x.license || '').split(',').map(s => s.trim()).includes(licenseSel.value));
    }
    if (sortSel.value === 'updated_at') {
      arr.sort((a,b) => (b.updated_at||'').localeCompare(a.updated_at||''));
    } else {
      arr.sort((a,b) => (b.score || 0) - (a.score || 0));
    }
    const total = arr.length;
    countSpan.textContent = `${total} items`;
    const pages = Math.ceil(total / PAGE) || 1;
    if (page > pages) page = pages;
    pageInfo.textContent = `${page} / ${pages}`;
    const start = (page - 1) * PAGE;
    const end = start + PAGE;
    listDiv.innerHTML = arr.slice(start,end).map(x => {
      const tagsHtml = (x.tags||[]).map(t => `<small>${escapeHtml(t)}</small>`).join(', ');
      return `
        <div class="card">
          <b>${escapeHtml(x.title || '')}</b>
          <small>${escapeHtml(x.source_type||'')}</small>
          score:${x.score}
          <div>${escapeHtml(x.short_desc||'')}</div>
          <div><small>tags: ${tagsHtml}</small></div>
          <a href="${escapeHtml(x.url||'#')}" target="_blank" rel="noopener"
             onclick="plausible('Open',{props:{value:'Open'}})">Open</a>
        </div>
      `;
    }).join('');
  }
  // listeners
  q.addEventListener('input', () => { plausible('Search'); page=1; render(); });
  sortSel.addEventListener('change', () => { plausible('Sort',{props:{value:sortSel.value}}); page=1; render(); });
  typeSel.addEventListener('change', () => { plausible('TypeFilter',{props:{value:typeSel.value}}); page=1; render(); });
  licenseSel.addEventListener('change', () => { plausible('LicenseFilter',{props:{value:licenseSel.value}}); page=1; render(); });
  prev.addEventListener('click', () => { if (page>1) { page--; render(); } });
  next.addEventListener('click', () => { page++; render(); });

  render();
}
main().catch(err => {
  document.getElementById('list').textContent = 'Error loading resources';
  console.error(err);
});
</script>
