<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ page.title }} — {{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <!-- Plausible -->
  <link rel="preconnect" href="https://plausible.io">
  <script defer data-domain="karasu12071128-creator.github.io" src="https://plausible.io/js/script.js"></script>
  <style>
    :root{--bd:#e5e5e5;--muted:#777;--pill:#f6f6f6}
    body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,"Hiragino Kaku Gothic ProN",Meiryo,"Noto Sans JP",sans-serif;margin:24px;line-height:1.6}
    header,footer{opacity:.8;font-size:.9em}
    a{color:#5a3bd6;text-decoration:none}
    nav a{display:inline-block;margin-right:12px}
    .csv{display:inline-block;padding:10px 16px;border:1px solid var(--bd);border-radius:30px;text-decoration:none;margin-right:12px}
  </style>
</head>
<body>
<header>
  <h1>{{ site.title }}</h1>
  <p>{{ site.description }}</p>
  <nav>
    <a href="{{ '/' | relative_url }}">Home</a>・
    <a href="{{ '/list.html' | relative_url }}">一覧</a>
    <a class="csv" href="{{ '/resources.csv' | relative_url }}">CSV（サンプル）</a>
  </nav>
</header>
<main>
  {{ content }}
</main>
<footer>
  <p>© {{ site.title }}</p>
</footer>
</body>
</html>
